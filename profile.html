<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Προφίλ χρήστη — StreamVault">
  <title>StreamVault — Προφίλ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>
    /* ── Profile hero banner ── */
    .profile-hero {
      padding: calc(var(--nav-h) + 2.5rem) 4vw 0;
      background: linear-gradient(
        to bottom,
        rgba(229,9,20,.06) 0%,
        transparent 100%
      );
      border-bottom: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }

    .profile-banner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding-bottom: 2rem;
    }

    .profile-avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: .04em;
    }

    .profile-info { flex: 1; }

    .profile-username {
      font-family: var(--font-display);
      font-size: 2.1rem;
      letter-spacing: .04em;
      color: var(--text-1);
      line-height: 1.1;
    }

    .profile-email {
      font-size: .82rem;
      color: var(--text-4);
      margin-top: .3rem;
    }

    /* ── Tab navigation ── */
    .profile-tabs {
      max-width: 1400px;
      margin: 0 auto 2rem;
      padding: 0 4vw;
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
    }

    .profile-tab {
      padding: .55rem 1.2rem;
      border-radius: var(--radius);
      font-size: .84rem;
      font-weight: 500;
      color: var(--text-3);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .profile-tab.active,
    .profile-tab:hover {
      color: var(--text-1);
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .profile-tab .tab-count {
      font-size: .7rem;
      font-weight: 700;
      color: var(--text-4);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 7px;
      transition: color var(--transition), background var(--transition);
    }

    .profile-tab.active .tab-count {
      color: var(--accent);
      background: rgba(229,9,20,.15);
      border-color: rgba(229,9,20,.3);
    }

    /* ── Panels ── */
    .profile-content {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 4vw 4rem;
    }

    .profile-panel { display: none; }
    .profile-panel.active { display: block; }

    .profile-panel-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      letter-spacing: .06em;
      color: var(--text-2);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    /* ── Empty states ── */
    .profile-empty {
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--text-3);
    }

    .profile-empty-icon {
      font-size: 2.8rem;
      margin-bottom: .75rem;
      opacity: .5;
    }

    .profile-empty p {
      font-size: .9rem;
      margin-bottom: 1rem;
      color: var(--text-3);
    }

    /* ── Login prompt ── */
    .profile-login-prompt {
      max-width: 420px;
      margin: 6rem auto;
      text-align: center;
      padding: 2.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .profile-login-prompt h2 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      letter-spacing: .04em;
      margin-bottom: .75rem;
    }

    .profile-login-prompt p {
      font-size: .88rem;
      color: var(--text-3);
      margin-bottom: 1.5rem;
      line-height: 1.65;
    }

    .profile-login-prompt .btn-primary { margin: 0 auto; }

    /* ── Skeleton ── */
    .profile-skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    @media (max-width: 600px) {
      .profile-banner { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .profile-tabs   { gap: .35rem; }
      .profile-tab    { padding: .45rem .9rem; font-size: .78rem; }
    }
  </style>
</head>
<body data-page="profile">

  <!-- ── Navigation ────────────────────────────────────── -->
  <nav class="nav scrolled" id="navbar">
    <div class="nav-logo">
      <a href="./index.html">STREAM<span>VAULT</span></a>
    </div>
    <div class="nav-links">
      <a href="./index.html" class="nav-link">Αρχική Σελίδα</a>
    </div>
    <div class="nav-actions" id="nav-actions">
      <button class="btn-icon" id="searchToggle" aria-label="Αναζήτηση" style="display:none"></button>
      <!-- Auth injected by AuthController -->
    </div>
  </nav>

  <!-- ── Profile Hero ──────────────────────────────────── -->
  <div class="profile-hero" id="profileHero">
    <div class="profile-banner">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div class="profile-info">
        <div class="profile-username" id="profileUsername">
          <div class="skeleton" style="width:200px;height:34px;border-radius:4px"></div>
        </div>
        <div class="profile-email" id="profileEmail"></div>
      </div>
    </div>
  </div>

  <!-- ── Main Profile Area ─────────────────────────────── -->
  <main id="profileMain">

    <!-- Tab navigation (4 tabs) -->
    <nav class="profile-tabs" id="profileTabs" aria-label="Ενότητες προφίλ">
      <button class="profile-tab active" data-panel="favorites">
        ❤️ Αγαπημένα
        <span class="tab-count" id="favCount">0</span>
      </button>
      <button class="profile-tab" data-panel="watchlist">
        📌 Watchlist
        <span class="tab-count" id="watchlistCount">0</span>
      </button>
      <button class="profile-tab" data-panel="ratings">
        ⭐ Αξιολογήσεις
        <span class="tab-count" id="ratingsCount">0</span>
      </button>
      <button class="profile-tab" data-panel="comments">
        💬 Σχόλια
        <span class="tab-count" id="commentsCount">0</span>
      </button>
    </nav>

    <!-- Tab panels -->
    <div class="profile-content">

      <!-- ① Favorites -->
      <div class="profile-panel active" id="panel-favorites">
        <h2 class="profile-panel-title">❤️ Αγαπημένα <span class="count-badge" id="favCountPanel">0</span></h2>
        <div id="favoritesGrid">
          <div class="profile-skeleton-grid">
            <div class="series-card skeleton-card"><div class="skeleton skeleton-poster"></div></div>
            <div class="series-card skeleton-card"><div class="skeleton skeleton-poster"></div></div>
            <div class="series-card skeleton-card"><div class="skeleton skeleton-poster"></div></div>
            <div class="series-card skeleton-card"><div class="skeleton skeleton-poster"></div></div>
          </div>
        </div>
      </div>

      <!-- ② Watchlist -->
      <div class="profile-panel" id="panel-watchlist">
        <h2 class="profile-panel-title">📌 Watchlist <span class="count-badge" id="watchlistCountPanel">0</span></h2>
        <div id="watchlistGrid">
          <div class="profile-skeleton-grid">
            <div class="series-card skeleton-card"><div class="skeleton skeleton-poster"></div></div>
            <div class="series-card skeleton-card"><div class="skeleton skeleton-poster"></div></div>
            <div class="series-card skeleton-card"><div class="skeleton skeleton-poster"></div></div>
          </div>
        </div>
      </div>

      <!-- ③ Ratings -->
      <div class="profile-panel" id="panel-ratings">
        <h2 class="profile-panel-title">⭐ Αξιολογήσεις μου <span class="count-badge" id="ratingsCountPanel">0</span></h2>
        <div id="ratingsGrid">
          <p style="color:var(--text-3);font-size:.85rem">Φόρτωση…</p>
        </div>
      </div>

      <!-- ④ Comments -->
      <div class="profile-panel" id="panel-comments">
        <h2 class="profile-panel-title">💬 Σχόλιά μου <span class="count-badge" id="commentsCountPanel">0</span></h2>
        <div id="commentsGrid">
          <p style="color:var(--text-3);font-size:.85rem">Φόρτωση…</p>
        </div>
      </div>

    </div><!-- /.profile-content -->
  </main>

  <!-- ── Footer ────────────────────────────────────────── -->
  <footer class="footer">
    <p>
      Powered by <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a>
      &nbsp;·&nbsp; StreamVault
    </p>
  </footer>

  <script type="module" src="./assets/js/app.js"></script>

  <script>
    /* ── Tab switcher (pure JS, no framework) ── */
    document.addEventListener('DOMContentLoaded', () => {
      const tabs   = document.querySelectorAll('.profile-tab');
      const panels = document.querySelectorAll('.profile-panel');

      function activateTab(panelName) {
        tabs.forEach(t   => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        const tab   = document.querySelector(`[data-panel="${panelName}"]`);
        const panel = document.getElementById(`panel-${panelName}`);
        if (tab)   tab.classList.add('active');
        if (panel) panel.classList.add('active');
        history.replaceState(null, '', `#${panelName}`);
      }

      tabs.forEach(tab => {
        tab.addEventListener('click', () => activateTab(tab.dataset.panel));
      });

      // Honor URL hash on load
      const hash = location.hash.replace('#', '');
      const validPanels = ['favorites','watchlist','ratings','comments'];
      if (hash && validPanels.includes(hash)) activateTab(hash);

      // Sync tab count badges from JS-injected count elements
      // (app.js writes to #favCount, #watchlistCount etc.)
      const syncCounts = () => {
        [
          ['favCount',        'favCountPanel'],
          ['watchlistCount',  'watchlistCountPanel'],
          ['ratingsCount',    'ratingsCountPanel'],
          ['commentsCount',   'commentsCountPanel'],
        ].forEach(([src, dst]) => {
          const s = document.getElementById(src);
          const d = document.getElementById(dst);
          if (s && d && s.textContent !== d.textContent) d.textContent = s.textContent;
        });
      };
      // Poll lightly until data loads
      const syncInterval = setInterval(syncCounts, 800);
      setTimeout(() => clearInterval(syncInterval), 30000);
    });
  </script>
</body>
</html>
