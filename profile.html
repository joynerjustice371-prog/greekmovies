<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Το προφίλ σας — StreamVault">
  <title>StreamVault — Προφίλ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body data-page="profile">

  <nav class="nav" id="navbar" aria-label="Κύρια πλοήγηση">
    <div class="nav-logo">
      <a href="./index.html">STREAM<span>VAULT</span></a>
    </div>
    <div class="nav-links">
      <a href="./index.html"    class="nav-link" data-nav="home">Αρχική Σελίδα</a>
      <a href="./genres.html"   class="nav-link" data-nav="genres">Είδος Ταινίας</a>
      <a href="./networks.html" class="nav-link" data-nav="networks">Network</a>
      <a href="./rules.html"    class="nav-link" data-nav="rules">Κανόνες</a>
    </div>
    <div class="nav-actions" id="nav-actions">
      <!-- Auth UI injected by AuthController -->
    </div>
  </nav>

  <main class="main-content profile-page" id="profileMain">

    <section class="profile-hero" id="profileHero">
      <div class="profile-avatar-wrap">
        <span class="profile-avatar" id="profileAvatar">?</span>
        <img class="profile-avatar-img" id="profileAvatarImg" alt="" hidden>
      </div>
      <div class="profile-info">
        <h1 class="profile-username" id="profileUsername">—</h1>
        <p class="profile-email" id="profileEmail">—</p>
        <button class="btn-secondary profile-edit-btn" id="profileEditBtn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          Επεξεργασία
        </button>
      </div>
      <div class="profile-stats" id="profileStats"></div>
    </section>

    <nav class="profile-tabs" aria-label="Ενότητες προφίλ">
      <button class="profile-tab active" data-panel="favorites"  type="button"><span>❤️</span> Αγαπημένα <span class="profile-tab-count" id="favCount">0</span></button>
      <button class="profile-tab"        data-panel="watchlist"  type="button"><span>📌</span> Watchlist <span class="profile-tab-count" id="watchlistCount">0</span></button>
      <button class="profile-tab"        data-panel="seen"       type="button"><span>✓</span> Έχω δει <span class="profile-tab-count" id="seenCount">0</span></button>
      <button class="profile-tab"        data-panel="ratings"    type="button"><span>⭐</span> Αξιολογήσεις <span class="profile-tab-count" id="ratingsCount">0</span></button>
      <button class="profile-tab"        data-panel="comments"   type="button"><span>💬</span> Σχόλια <span class="profile-tab-count" id="commentsCount">0</span></button>
    </nav>

    <section class="profile-panel active" id="panel-favorites"><div id="favoritesGrid"></div></section>
    <section class="profile-panel"        id="panel-watchlist"><div id="watchlistGrid"></div></section>
    <section class="profile-panel"        id="panel-seen"><div id="seenGrid"></div></section>
    <section class="profile-panel"        id="panel-ratings"><div id="ratingsGrid"></div></section>
    <section class="profile-panel"        id="panel-comments"><div id="commentsGrid"></div></section>

  </main>

  <footer class="footer">
    <p>Powered by <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a> &nbsp;·&nbsp; StreamVault</p>
  </footer>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
