<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Σειρές — GreekMovies">
  <title>GreekMovies — Σειρές</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%23141414'/><polygon points='35,25 75,50 35,75' fill='%23e50914'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body data-page="series">

  <!-- NAV -->
  <nav class="nav" id="navbar" aria-label="Κύρια πλοήγηση">
    <div class="nav-logo">
      <a href="./index.html">GREEK<span>MOVIES</span></a>
    </div>
    <div class="nav-links">
      <a href="./index.html"    class="nav-link" data-nav="home">Αρχική Σελίδα</a>
      <a href="./genres.html"   class="nav-link" data-nav="genres">Κατηγορίες</a>
      <a href="./networks.html" class="nav-link" data-nav="networks">Network</a>
      <a href="./movies.html"   class="nav-link" data-nav="movies">Ταινίες</a>
      <a href="./series.html"   class="nav-link active" data-nav="series_list">Σειρές</a>
      <a href="./rules.html"    class="nav-link" data-nav="rules">Κανόνες</a>
    </div>
    <div class="nav-actions" id="nav-actions">
      <button class="btn-icon" id="searchToggle" aria-label="Αναζήτηση (Ctrl+K)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- SEARCH OVERLAY (used in listing mode) -->
  <div class="search-overlay" id="searchOverlay" role="dialog" aria-label="Αναζήτηση">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Αναζήτηση σειράς…" autocomplete="off" spellcheck="false">
      <button class="btn-icon search-close" id="searchClose" aria-label="Κλείσιμο">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="search-results" id="searchResults" aria-live="polite"></div>
  </div>

  <!--
    DUAL-MODE CONTAINER
    No ?id  → SeriesController renders listing layout into #seriesMain
    With ?id → SeriesController renders detail layout into #seriesMain
  -->
  <main id="seriesMain" class="series-main-init">
    <!-- JS replaces this entirely on load -->
    <div class="series-main-loading">
      <div class="spinner"></div>
    </div>
  </main>

  <footer class="footer">
    <p>Powered by <a href="https://www.themoviedb.org" target="_blank" rel="noopener">TMDB</a> &nbsp;·&nbsp; GreekMovies</p>
  </footer>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
